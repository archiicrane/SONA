<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONA Data</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 fill=%22%23081234%22/%3E%3Cg stroke=%22%235FD3E8%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 fill=%22none%22%3E%3Cpath d=%22M10 32 Q10 24 18 24 Q26 24 26 32 Q26 40 18 40 Q10 40 10 32%22/%3E%3Cpath d=%22M30 32 Q30 20 40 20 Q50 20 50 32 Q50 44 40 44 Q30 44 30 32%22/%3E%3Cpath d=%22M54 32 Q54 16 64 16 Q70 16 70 32 Q70 48 64 48 Q54 48 54 32%22 opacity=%220.7%22/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="analysis-scroll">
  <div class="app-shell">
    <div class="sona-header">
      <div class="sona-brand">
        <h1 class="sona-title">SONA</h1>
        <div class="sona-tagline">So Over Noisy A**holes</div>
      </div>
    </div>

    <div class="page-card analysis-page">
      <div class="top-bar analysis-top-bar">
        <div>
          <div class="analysis-page-label">System Data</div>
          <h2 class="analysis-page-title">Raw Sensor Data</h2>
        </div>

        <div class="button-row">
          <a class="nav-button compact-button" href="/">Dashboard</a>
          <a class="nav-button compact-button" href="/history.html">Analysis</a>
        </div>
      </div>

      <div class="card raw-data-card">
        <div class="label">Saved Sensor Readings</div>

        <div class="table-wrap">
          <table id="rawTable">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Sensor</th>
                <th>Sound (dB)</th>
                <th>Distance (cm)</th>
                <th>State</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="historyStore.js"></script>
  <script src="raw.js"></script>
</body>
</html>
